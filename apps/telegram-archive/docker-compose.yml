services:
  telegram-backup:
    image: drumsergio/telegram-archive:v7.4.2
    container_name: telegram-archive-backup
    restart: unless-stopped
    command: ["python", "-m", "src", "schedule"]
    environment:
      TELEGRAM_API_ID: ${TELEGRAM_API_ID}
      TELEGRAM_API_HASH: ${TELEGRAM_API_HASH}
      TELEGRAM_PHONE: ${TELEGRAM_PHONE}
      SESSION_NAME: telegram_backup
      SCHEDULE: ${SCHEDULE:-0 */6 * * *}
      BACKUP_PATH: /data/backups
      DOWNLOAD_MEDIA: "true"
      MAX_MEDIA_SIZE_MB: "100"
      BATCH_SIZE: "100"
      CHAT_TYPES: ${CHAT_TYPES:-private,groups,channels}
      DB_TYPE: sqlite
      DB_PATH: /data/backups/telegram_backup.db
      ENABLE_LISTENER: "false"
      LOG_LEVEL: INFO
    volumes:
      - ${APP_DATA_DIR}/data:/data
    networks:
      - tipi_main_network
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    labels:
      runtipi.managed: true

  telegram-viewer:
    image: drumsergio/telegram-archive-viewer:v7.4.2
    container_name: telegram-archive-viewer
    restart: unless-stopped
    ports:
      - ${APP_PORT}:8000
    environment:
      BACKUP_PATH: /data/backups
      VIEWER_USERNAME: ${VIEWER_USERNAME:-}
      VIEWER_PASSWORD: ${VIEWER_PASSWORD:-}
      AUTH_SESSION_DAYS: "30"
      VIEWER_TIMEZONE: ${TZ}
      SHOW_STATS: "true"
      DB_TYPE: sqlite
      DB_PATH: /data/backups/telegram_backup.db
      LOG_LEVEL: INFO
    volumes:
      - ${APP_DATA_DIR}/data:/data
    networks:
      - tipi_main_network
    read_only: true
    tmpfs:
      - /tmp
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    labels:
      traefik.enable: true
      traefik.http.middlewares.telegram-archive-web-redirect.redirectscheme.scheme: https
      traefik.http.services.telegram-archive.loadbalancer.server.port: 8000
      traefik.http.routers.telegram-archive-insecure.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.telegram-archive-insecure.entrypoints: web
      traefik.http.routers.telegram-archive-insecure.service: telegram-archive
      traefik.http.routers.telegram-archive-insecure.middlewares: telegram-archive-web-redirect
      traefik.http.routers.telegram-archive.rule: Host(`${APP_DOMAIN}`)
      traefik.http.routers.telegram-archive.entrypoints: websecure
      traefik.http.routers.telegram-archive.service: telegram-archive
      traefik.http.routers.telegram-archive.tls.certresolver: myresolver
      traefik.http.routers.telegram-archive-local-insecure.rule: Host(`telegram-archive.${LOCAL_DOMAIN}`)
      traefik.http.routers.telegram-archive-local-insecure.entrypoints: web
      traefik.http.routers.telegram-archive-local-insecure.service: telegram-archive
      traefik.http.routers.telegram-archive-local-insecure.middlewares: telegram-archive-web-redirect
      traefik.http.routers.telegram-archive-local.rule: Host(`telegram-archive.${LOCAL_DOMAIN}`)
      traefik.http.routers.telegram-archive-local.entrypoints: websecure
      traefik.http.routers.telegram-archive-local.service: telegram-archive
      traefik.http.routers.telegram-archive-local.tls: true
      runtipi.managed: true
