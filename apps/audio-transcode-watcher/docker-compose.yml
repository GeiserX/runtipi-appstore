services:
  audio-transcode-watcher:
    image: drumsergio/audio-transcoder:latest
    container_name: audio-transcode-watcher
    restart: unless-stopped
    volumes:
      - ${APP_DATA_DIR}/data/config:/app/config
      - ${APP_DATA_DIR}/data/music:/music
    networks:
      - tipi_main_network
    labels:
      runtipi.managed: true
